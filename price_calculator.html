<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy vs Sell Price Calculator</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f7fa;
            color: #333;
        }
        h1 {
            text-align: center;
            margin-bottom: 24px;
            color: #2c3e50;
        }

        /* Mode Toggle */
        .mode-toggle {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
        }
        .mode-toggle button {
            padding: 10px 28px;
            font-size: 15px;
            border: 2px solid #3498db;
            background: #fff;
            color: #3498db;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }
        .mode-toggle button:first-child {
            border-radius: 8px 0 0 8px;
        }
        .mode-toggle button:last-child {
            border-radius: 0 8px 8px 0;
        }
        .mode-toggle button.active {
            background: #3498db;
            color: #fff;
        }

        /* Card */
        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            padding: 24px;
            margin-bottom: 20px;
        }
        .card h2 {
            font-size: 16px;
            color: #7f8c8d;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .card-header h2 {
            margin-bottom: 0;
        }

        /* Display unit picker */
        .display-unit-picker {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .display-unit-picker label {
            font-size: 12px;
            color: #7f8c8d;
            white-space: nowrap;
        }
        .display-unit-picker select {
            padding: 5px 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
            background: #f9f9f9;
            color: #555;
            cursor: pointer;
        }
        .display-unit-picker select:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 2px rgba(52,152,219,0.15);
        }

        /* Reset button */
        .btn-reset {
            padding: 6px 14px;
            font-size: 12px;
            border: 1px solid #bbb;
            border-radius: 6px;
            background: #fff;
            color: #777;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        .btn-reset:hover {
            border-color: #e74c3c;
            color: #e74c3c;
        }

        /* Input rows */
        .input-row {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            gap: 10px;
        }
        .input-row label {
            flex: 0 0 200px;
            font-weight: 500;
            font-size: 14px;
        }
        .input-row input[type="number"] {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            max-width: 160px;
        }
        .input-row select {
            padding: 8px 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
            background: #f9f9f9;
            color: #555;
            cursor: pointer;
        }
        .input-row input[type="number"]:focus,
        .input-row select:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 2px rgba(52,152,219,0.15);
        }

        /* Results */
        .results-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }
        .result-box {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 16px;
            text-align: center;
        }
        .result-box .result-label {
            font-size: 13px;
            color: #7f8c8d;
            margin-bottom: 6px;
        }
        .result-box .result-value {
            font-size: 24px;
            font-weight: 700;
            color: #2c3e50;
        }
        .result-box.profit .result-value { color: #27ae60; }
        .result-box.loss .result-value { color: #e74c3c; }

        /* Breakdown table */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 8px;
        }
        thead th {
            background: #f2f2f2;
            padding: 10px 12px;
            text-align: right;
            font-size: 13px;
            color: #555;
            border-bottom: 2px solid #ddd;
        }
        thead th:first-child { text-align: left; }
        tbody td {
            padding: 9px 12px;
            text-align: right;
            font-size: 14px;
            border-bottom: 1px solid #eee;
        }
        tbody td:first-child {
            text-align: left;
            font-weight: 500;
        }
        tbody tr.total-row {
            font-weight: 700;
            border-top: 2px solid #bbb;
        }
        tbody tr.total-row td {
            padding-top: 12px;
        }
        tbody tr.sell-row td {
            color: #2c3e50;
            font-weight: 700;
            font-size: 15px;
        }
        tbody tr.sell-row.loss td:not(:first-child) { color: #e74c3c; }
        tbody tr.sell-row.profit td:not(:first-child) { color: #27ae60; }

        /* Table scroll wrapper */
        .table-scroll {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* Dark mode */
        @media (prefers-color-scheme: dark) {
            body { background: #1a1a2e; color: #e0e0e0; }
            h1 { color: #e0e0e0; }
            .mode-toggle button {
                background: #16213e;
                border-color: #3498db;
                color: #5dade2;
            }
            .mode-toggle button.active {
                background: #3498db;
                color: #fff;
            }
            .card {
                background: #16213e;
                box-shadow: 0 2px 12px rgba(0,0,0,0.3);
            }
            .card h2 { color: #95a5a6; }
            .input-row input[type="number"] {
                background: #0f3460;
                border-color: #2c3e6d;
                color: #e0e0e0;
            }
            .input-row select {
                background: #0f3460;
                border-color: #2c3e6d;
                color: #e0e0e0;
            }
            .input-row input[type="number"]:focus,
            .input-row select:focus {
                border-color: #5dade2;
                box-shadow: 0 0 0 2px rgba(93,173,226,0.2);
            }
            .result-box { background: #0f3460; }
            .result-box .result-value { color: #e0e0e0; }
            thead th {
                background: #0f3460;
                color: #95a5a6;
                border-bottom-color: #2c3e6d;
            }
            tbody td {
                border-bottom-color: #1a2744;
                color: #ccc;
            }
            tbody td:first-child { color: #e0e0e0; }
            tbody tr.total-row { border-top-color: #3c5078; }
            tbody tr.sell-row td { color: #e0e0e0; }
            .btn-reset {
                background: #16213e;
                border-color: #3c5078;
                color: #95a5a6;
            }
            .btn-reset:hover {
                border-color: #e74c3c;
                color: #e74c3c;
            }
            .display-unit-picker select {
                background: #0f3460;
                border-color: #2c3e6d;
                color: #e0e0e0;
            }
            .display-unit-picker label { color: #95a5a6; }
        }

        /* Responsive */
        @media (max-width: 600px) {
            body { padding: 12px; }
            h1 { font-size: 22px; margin-bottom: 16px; }

            .mode-toggle { margin-bottom: 16px; }
            .mode-toggle button {
                padding: 10px 20px;
                font-size: 14px;
            }

            .card { padding: 16px; margin-bottom: 14px; }
            .card h2 { font-size: 14px; margin-bottom: 12px; }

            /* Stack inputs: label on top, input + unit side by side */
            .input-row {
                flex-wrap: wrap;
                margin-bottom: 14px;
                gap: 6px;
            }
            .input-row label {
                flex: 0 0 100%;
                margin-bottom: 2px;
                font-size: 13px;
            }
            .input-row input[type="number"] {
                flex: 1;
                min-width: 0;
                max-width: none;
                font-size: 16px; /* prevents iOS zoom on focus */
            }
            .input-row select {
                flex: 0 0 auto;
                font-size: 14px;
            }

            /* Stack result summary boxes */
            .results-grid { grid-template-columns: 1fr; gap: 10px; }
            .result-box .result-value { font-size: 20px; }

            /* Breakdown table: scrollable, compact */
            table {
                min-width: 560px;
            }
            thead th {
                padding: 8px 8px;
                font-size: 11px;
                white-space: nowrap;
            }
            tbody td {
                padding: 7px 8px;
                font-size: 12px;
                white-space: nowrap;
            }
        }
    </style>
</head>
<body>
    <h1>Buy vs Sell Price Calculator</h1>

    <!-- Mode Toggle -->
    <div class="mode-toggle">
        <button id="modeBuy" class="active" onclick="setMode('buy')">Buy → Sell</button>
        <button id="modeSell" onclick="setMode('sell')">Sell → Buy</button>
    </div>

    <!-- Inputs -->
    <div class="card">
        <div class="card-header">
            <h2>Inputs</h2>
            <button class="btn-reset" onclick="resetDefaults()" title="Reset all inputs to defaults">Reset</button>
        </div>

        <!-- Buy/Sell Price row (label changes with mode) -->
        <div class="input-row">
            <label id="priceLabel" for="priceInput">Buy Price:</label>
            <input type="number" id="priceInput" step="0.01" value="0.05">
            <select id="priceUnit">
                <option value="lb">$/lb</option>
                <option value="kg">$/kg</option>
                <option value="standard_ton">$/std ton</option>
                <option value="metric_ton">$/mt</option>
            </select>
        </div>

        <div class="input-row">
            <label for="freightDrayage">Freight & Drayage:</label>
            <input type="number" id="freightDrayage" step="0.01" min="0" value="1000">
            <select id="freightUnit">
                <option value="flat">$ flat</option>
                <option value="lb">$/lb</option>
                <option value="kg">$/kg</option>
                <option value="standard_ton">$/std ton</option>
                <option value="metric_ton">$/mt</option>
            </select>
        </div>

        <div class="input-row">
            <label for="loadingWeight">Loading Weight:</label>
            <input type="number" id="loadingWeight" step="1" min="0" value="40000">
            <select id="weightUnit">
                <option value="lb">lbs</option>
                <option value="kg">kg</option>
                <option value="standard_ton">std tons</option>
                <option value="metric_ton">mt</option>
            </select>
        </div>

        <div class="input-row">
            <label for="overheadCost">Overhead Cost:</label>
            <input type="number" id="overheadCost" step="0.01" min="0" value="0.02">
            <select id="overheadUnit">
                <option value="lb">$/lb</option>
                <option value="kg">$/kg</option>
                <option value="standard_ton">$/std ton</option>
                <option value="metric_ton">$/mt</option>
            </select>
        </div>

        <div class="input-row">
            <label for="profitMargin">Profit Margin:</label>
            <input type="number" id="profitMargin" step="0.01" min="0" value="0.02">
            <select id="marginUnit">
                <option value="lb">$/lb</option>
                <option value="kg">$/kg</option>
                <option value="standard_ton">$/std ton</option>
                <option value="metric_ton">$/mt</option>
                <option value="percent">%</option>
            </select>
        </div>
    </div>

    <!-- Results -->
    <div class="card" id="resultsCard">
        <div class="card-header">
            <h2>Results</h2>
            <div class="display-unit-picker">
                <label for="displayUnit">Display in:</label>
                <select id="displayUnit">
                    <option value="lb">$/lb</option>
                    <option value="kg">$/kg</option>
                    <option value="standard_ton">$/std ton</option>
                    <option value="metric_ton">$/mt</option>
                </select>
            </div>
        </div>
        <div id="resultsSummary"></div>
        <div id="breakdownTable"></div>
    </div>

    <script>
        // --- Conversion helpers (everything to $/lb internally) ---
        const TO_LB = {
            lb: 1,
            kg: 2.20462,
            standard_ton: 2000,
            metric_ton: 2204.62
        };

        function toPerLb(value, unit) {
            if (unit === 'percent') return null;
            return value / TO_LB[unit];
        }

        function fromPerLb(perLb, unit) {
            return perLb * TO_LB[unit];
        }

        function weightToLbs(value, unit) {
            return value * TO_LB[unit];
        }

        function fmt(n, decimals = 2) {
            if (!isFinite(n)) return '--';
            return n.toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
        }

        function fmtDollar(n, decimals = 2) {
            if (!isFinite(n)) return '--';
            const abs = Math.abs(n);
            const formatted = abs.toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
            return n < 0 ? `-$${formatted}` : `$${formatted}`;
        }

        // --- localStorage persistence ---
        const STORAGE_KEY = 'priceCalcState';
        const DEFAULTS = {
            priceInput: '0.05', priceUnit: 'lb',
            freightDrayage: '1000', freightUnit: 'flat',
            loadingWeight: '40000', weightUnit: 'lb',
            overheadCost: '0.02', overheadUnit: 'lb',
            profitMargin: '0.02', marginUnit: 'lb',
            displayUnit: 'lb', mode: 'buy'
        };

        function saveState() {
            const state = {};
            for (const id of Object.keys(DEFAULTS)) {
                if (id === 'mode') { state.mode = currentMode; continue; }
                const el = document.getElementById(id);
                if (el) state[id] = el.value;
            }
            try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
        }

        function loadState() {
            try {
                const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
                if (!saved) return;
                for (const [id, val] of Object.entries(saved)) {
                    if (id === 'mode') continue;
                    const el = document.getElementById(id);
                    if (el) el.value = val;
                }
                if (saved.mode) setMode(saved.mode);
            } catch (e) {}
        }

        function resetDefaults() {
            for (const [id, val] of Object.entries(DEFAULTS)) {
                if (id === 'mode') continue;
                const el = document.getElementById(id);
                if (el) el.value = val;
            }
            setMode(DEFAULTS.mode);
            try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
        }

        // --- Mode ---
        let currentMode = 'buy';

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('modeBuy').classList.toggle('active', mode === 'buy');
            document.getElementById('modeSell').classList.toggle('active', mode === 'sell');
            document.getElementById('priceLabel').textContent = mode === 'buy' ? 'Buy Price:' : 'Sell Price:';
            calculate();
        }

        // --- Main calculation ---
        function calculate() {
            const priceRaw = parseFloat(document.getElementById('priceInput').value) || 0;
            const priceUnit = document.getElementById('priceUnit').value;
            const freightRaw = parseFloat(document.getElementById('freightDrayage').value) || 0;
            const freightUnit = document.getElementById('freightUnit').value;
            const weightRaw = parseFloat(document.getElementById('loadingWeight').value) || 0;
            const weightUnit = document.getElementById('weightUnit').value;
            const overheadRaw = parseFloat(document.getElementById('overheadCost').value) || 0;
            const overheadUnit = document.getElementById('overheadUnit').value;
            const marginRaw = parseFloat(document.getElementById('profitMargin').value) || 0;
            const marginUnit = document.getElementById('marginUnit').value;

            // Convert everything to $/lb
            const priceLb = toPerLb(priceRaw, priceUnit);
            const weightLbs = weightToLbs(weightRaw, weightUnit);

            let shippingLb;
            if (freightUnit === 'flat') {
                shippingLb = weightLbs > 0 ? freightRaw / weightLbs : 0;
            } else {
                shippingLb = toPerLb(freightRaw, freightUnit);
            }

            const overheadLb = toPerLb(overheadRaw, overheadUnit);

            if (currentMode === 'buy') {
                let marginLb;
                if (marginUnit === 'percent') {
                    marginLb = (priceLb + shippingLb + overheadLb) * (marginRaw / 100);
                } else {
                    marginLb = toPerLb(marginRaw, marginUnit);
                }

                const totalCostLb = priceLb + shippingLb + overheadLb;
                const sellLb = totalCostLb + marginLb;

                renderResults({
                    mode: 'buy',
                    buyLb: priceLb,
                    shippingLb,
                    overheadLb,
                    marginLb,
                    totalCostLb,
                    sellLb,
                    weightLbs
                });
            } else {
                let marginLb;
                if (marginUnit === 'percent') {
                    const sellLb = priceLb;
                    const totalCostLb = sellLb / (1 + marginRaw / 100);
                    marginLb = sellLb - totalCostLb;
                    const buyLb = totalCostLb - shippingLb - overheadLb;

                    renderResults({
                        mode: 'sell',
                        buyLb,
                        shippingLb,
                        overheadLb,
                        marginLb,
                        totalCostLb,
                        sellLb,
                        weightLbs
                    });
                } else {
                    marginLb = toPerLb(marginRaw, marginUnit);
                    const sellLb = priceLb;
                    const buyLb = sellLb - marginLb - shippingLb - overheadLb;
                    const totalCostLb = buyLb + shippingLb + overheadLb;

                    renderResults({
                        mode: 'sell',
                        buyLb,
                        shippingLb,
                        overheadLb,
                        marginLb,
                        totalCostLb,
                        sellLb,
                        weightLbs
                    });
                }
            }

            saveState();
        }

        const UNIT_LABELS = { lb: '/lb', kg: '/kg', standard_ton: '/std ton', metric_ton: '/mt' };
        const UNIT_DECIMALS = { lb: 4, kg: 4, standard_ton: 2, metric_ton: 2 };

        function renderResults({ mode, buyLb, shippingLb, overheadLb, marginLb, totalCostLb, sellLb, weightLbs }) {
            const profitLb = sellLb - totalCostLb;
            const profitPct = totalCostLb !== 0 ? (profitLb / totalCostLb * 100) : 0;
            const isProfitable = profitLb >= 0;

            const dispUnit = document.getElementById('displayUnit').value;
            const dispLabel = UNIT_LABELS[dispUnit];
            const dispDec = UNIT_DECIMALS[dispUnit];
            const buyDisp = fromPerLb(buyLb, dispUnit);
            const sellDisp = fromPerLb(sellLb, dispUnit);
            const profitDisp = fromPerLb(profitLb, dispUnit);

            const buyLabel = mode === 'sell' ? 'Max Buy Price' : 'Buy Price';

            // Summary boxes
            const summaryHTML = `
                <div class="results-grid">
                    <div class="result-box ${mode === 'sell' ? (isProfitable ? 'profit' : 'loss') : ''}">
                        <div class="result-label">${buyLabel}</div>
                        <div class="result-value">${fmtDollar(buyDisp, dispDec)}${dispLabel}</div>
                    </div>
                    <div class="result-box ${mode === 'buy' ? (isProfitable ? 'profit' : 'loss') : ''}">
                        <div class="result-label">Sell Price</div>
                        <div class="result-value">${fmtDollar(sellDisp, dispDec)}${dispLabel}</div>
                    </div>
                    <div class="result-box ${isProfitable ? 'profit' : 'loss'}">
                        <div class="result-label">Total Load Profit</div>
                        <div class="result-value">${fmtDollar(profitLb * weightLbs, 0)}</div>
                    </div>
                </div>
            `;

            // Breakdown table
            const rows = [
                { label: 'Buy Price', lb: buyLb },
                { label: 'Shipping', lb: shippingLb },
                { label: 'Overhead', lb: overheadLb },
                { label: 'Total Cost', lb: totalCostLb, isTotal: true },
                { label: 'Profit Margin', lb: marginLb },
                { label: 'Sell Price', lb: sellLb, isSell: true }
            ];

            let tableHTML = `
                <div class="table-scroll">
                <table>
                    <thead>
                        <tr>
                            <th>Component</th>
                            <th>$/lb</th>
                            <th>$/std ton</th>
                            <th>$/metric ton</th>
                            <th>$/kg</th>
                            <th>Total Load</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            for (const row of rows) {
                const stdTon = fromPerLb(row.lb, 'standard_ton');
                const metricTon = fromPerLb(row.lb, 'metric_ton');
                const kg = fromPerLb(row.lb, 'kg');
                const totalLoad = row.lb * weightLbs;

                let trClass = '';
                if (row.isTotal) trClass = 'total-row';
                if (row.isSell) trClass = `sell-row ${isProfitable ? 'profit' : 'loss'}`;

                tableHTML += `
                    <tr class="${trClass}">
                        <td>${row.label}</td>
                        <td>${fmt(row.lb, 4)}</td>
                        <td>${fmt(stdTon, 2)}</td>
                        <td>${fmt(metricTon, 2)}</td>
                        <td>${fmt(kg, 4)}</td>
                        <td>${fmtDollar(totalLoad, 0)}</td>
                    </tr>
                `;
            }

            tableHTML += `
                    </tbody>
                </table>
                </div>
                <p style="margin-top: 12px; font-size: 13px; color: #7f8c8d;">
                    Margin: <strong style="color: ${isProfitable ? '#27ae60' : '#e74c3c'}">
                    ${fmtDollar(profitDisp, dispDec)}${dispLabel} (${fmt(profitPct, 1)}%)</strong>
                    &nbsp;|&nbsp; Total load profit:
                    <strong style="color: ${isProfitable ? '#27ae60' : '#e74c3c'}">
                    ${fmtDollar(profitLb * weightLbs, 2)}</strong>
                </p>
            `;

            document.getElementById('resultsSummary').innerHTML = summaryHTML;
            document.getElementById('breakdownTable').innerHTML = tableHTML;
        }

        // --- Init & live updates ---
        loadState();
        calculate();

        document.querySelectorAll('input, select').forEach(el => {
            el.addEventListener('input', calculate);
            el.addEventListener('change', calculate);
        });
    </script>
</body>
</html>
